<div class="app">
    <header
        class="app__header"
        [class.app__header--nav-open]="navMenuOpen()"
    >
        <div class="app__header-top">
            <button
                type="button"
                class="app__menu-btn"
                (click)="toggleNavMenu()"
                [attr.aria-expanded]="navMenuOpen()"
                aria-controls="app-main-nav"
                [attr.aria-label]="'app.menuToggle' | translate"
            >
                <span class="app__menu-icon" aria-hidden="true">
                    <span class="app__menu-icon-bar"></span>
                    <span class="app__menu-icon-bar"></span>
                    <span class="app__menu-icon-bar"></span>
                </span>
            </button>
            <a class="app__brand" routerLink="/">
                <img
                    class="app__brand-mark"
                    src="favicon.svg"
                    width="28"
                    height="28"
                    alt=""
                    decoding="async"
                />
                <span class="app__brand-text">{{ 'app.brand' | translate }}</span>
            </a>
            <div class="app__header-actions">
                <button
                    type="button"
                    class="app__theme-btn"
                    (click)="onThemeToggle()"
                    [attr.aria-label]="
                        themeService.theme() === 'dark'
                            ? ('theme.switchToLight' | translate)
                            : ('theme.switchToDark' | translate)
                    "
                >
                    <span class="app__theme-icon" aria-hidden="true">
                        @if (themeService.theme() === 'dark') {
                            <span class="app__theme-glyph">☼</span>
                        } @else {
                            <span class="app__theme-glyph">☽</span>
                        }
                    </span>
                </button>
                <div class="app__locale">
                    <label class="visually-hidden" for="app-locale-select">{{ 'locale.selectLabel' | translate }}</label>
                    <select
                        id="app-locale-select"
                        class="app__locale-select"
                        [value]="currentLang()"
                        (change)="onLocaleChange(($any($event.target).value))"
                        [attr.aria-label]="'locale.selectLabel' | translate"
                    >
                        <option value="en">{{ 'locale.en' | translate }}</option>
                        <option value="ru">{{ 'locale.ru' | translate }}</option>
                    </select>
                </div>
            </div>
        </div>
        <nav
            id="app-main-nav"
            class="app__nav"
            [attr.aria-label]="'app.navAria' | translate"
        >
            <a routerLink="/about" routerLinkActive="app__link--active" (click)="closeNavMenu()">{{
                'nav.about' | translate
            }}</a>
            <a routerLink="/study" routerLinkActive="app__link--active" (click)="closeNavMenu()">{{
                'nav.study' | translate
            }}</a>
            <a routerLink="/plan" routerLinkActive="app__link--active" (click)="closeNavMenu()">{{
                'nav.plan' | translate
            }}</a>
            <a
                routerLink="/quiz"
                routerLinkActive="app__link--active"
                [routerLinkActiveOptions]="{ exact: true }"
                (click)="closeNavMenu()"
            >
                {{ 'nav.quiz' | translate }}
            </a>
            <a routerLink="/dashboard" routerLinkActive="app__link--active" (click)="closeNavMenu()">{{
                'nav.dashboard' | translate
            }}</a>
        </nav>
    </header>
    @if (navMenuOpen()) {
        <button
            type="button"
            class="app__nav-backdrop"
            (click)="closeNavMenu()"
            [attr.aria-label]="'app.menuClose' | translate"
        ></button>
    }
    <main class="app__main">
        <router-outlet />
    </main>
    <footer class="app__footer" aria-hidden="true"></footer>
</div>
