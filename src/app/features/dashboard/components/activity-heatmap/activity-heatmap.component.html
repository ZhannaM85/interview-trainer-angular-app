<section class="heatmap" aria-labelledby="heatmap-heading">
    <h2 id="heatmap-heading" class="heatmap__title">{{ 'heatmap.heading' | translate }}</h2>
    <p class="heatmap__desc">{{ 'heatmap.description' | translate }}</p>

    <div class="heatmap__scroll">
        <div
            class="heatmap__cols"
            role="grid"
            [attr.aria-label]="'heatmap.gridAria' | translate"
        >
            @for (col of weekColumns(); track $index) {
                <div class="heatmap__week" role="row">
                    @for (cell of col; track cell.date) {
                        <button
                            type="button"
                            class="heatmap__cell"
                            [class.heatmap__cell--future]="cell.isFuture"
                            [class.heatmap__cell--today]="cell.isToday"
                            [class.heatmap__cell--l0]="cell.level === 0 && !cell.isFuture"
                            [class.heatmap__cell--l1]="cell.level === 1"
                            [class.heatmap__cell--l2]="cell.level === 2"
                            [class.heatmap__cell--l3]="cell.level === 3"
                            [class.heatmap__cell--l4]="cell.level === 4"
                            [disabled]="cell.isFuture"
                            [attr.aria-label]="cell.label"
                        ></button>
                    }
                </div>
            }
        </div>
    </div>

    <div class="heatmap__legend" aria-hidden="false">
        <span class="heatmap__legend-label">{{ 'heatmap.less' | translate }}</span>
        <span class="heatmap__legend-swatch heatmap__legend-swatch--0"></span>
        <span class="heatmap__legend-swatch heatmap__legend-swatch--1"></span>
        <span class="heatmap__legend-swatch heatmap__legend-swatch--2"></span>
        <span class="heatmap__legend-swatch heatmap__legend-swatch--3"></span>
        <span class="heatmap__legend-swatch heatmap__legend-swatch--4"></span>
        <span class="heatmap__legend-label">{{ 'heatmap.more' | translate }}</span>
    </div>
</section>
