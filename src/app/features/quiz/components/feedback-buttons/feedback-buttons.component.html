<div class="feedback" role="group" aria-label="How well did you know this?">
    <button type="button" class="feedback__btn feedback__btn--yes" (click)="answered.emit(true)">
        I knew it
    </button>
    <button type="button" class="feedback__btn feedback__btn--no" (click)="answered.emit(false)">
        I didn’t
    </button>
</div>
