<div class="self-eval" role="group" [attr.aria-label]="'selfEval.ariaLabel' | translate">
    <button type="button" class="self-eval__btn self-eval__btn--no" (click)="rated.emit('didntKnow')">
        <span class="self-eval__emoji" aria-hidden="true">😬</span>
        {{ 'selfEval.didntKnow' | translate }}
    </button>
    <button type="button" class="self-eval__btn self-eval__btn--partial" (click)="rated.emit('partial')">
        <span class="self-eval__emoji" aria-hidden="true">🤔</span>
        {{ 'selfEval.partial' | translate }}
    </button>
    <button type="button" class="self-eval__btn self-eval__btn--yes" (click)="rated.emit('nailed')">
        <span class="self-eval__emoji" aria-hidden="true">✅</span>
        {{ 'selfEval.nailed' | translate }}
    </button>
</div>
