<div class="interview-fb">
    <h2 class="interview-fb__title">{{ headline() }}</h2>

    <p class="interview-fb__score">{{ 'feedback.score' | translate: { value: scoreDelta() } }}</p>

    <div class="interview-fb__section">
        <p class="interview-fb__label">{{ 'feedback.weakArea' | translate }}</p>
        <p class="interview-fb__value">"{{ weakArea() }}"</p>
    </div>

    <div class="interview-fb__section">
        <p class="interview-fb__label">{{ 'feedback.nextReview' | translate }}</p>
        <p class="interview-fb__value">{{ nextReviewLabel() }}</p>
    </div>

    <button type="button" class="interview-fb__next" (click)="next.emit()">
        {{ 'feedback.nextQuestion' | translate }}
    </button>
</div>
