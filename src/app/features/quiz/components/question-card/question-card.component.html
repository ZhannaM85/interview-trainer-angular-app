<div class="card-wrap">
    <div
        class="card"
        [class.card--flipped]="flipped()"
        role="group"
        [attr.aria-label]="flipped() ? 'Answer side' : 'Question side'"
    >
        <div class="card__inner">
            <div class="card__face card__face--front">
                <p class="card__meta">
                    <span class="card__badge">{{ question().category }}</span>
                    <span class="card__badge card__badge--muted">{{ question().difficulty }}</span>
                </p>
                <p class="card__question">{{ question().question }}</p>
                <button
                    type="button"
                    class="card__flip-btn"
                    (click)="toggleFlip()"
                    [attr.aria-pressed]="flipped()"
                >
                    Show answer
                </button>
            </div>
            <div class="card__face card__face--back">
                <app-answer-panel [question]="question()" />
                <button type="button" class="card__flip-btn card__flip-btn--secondary" (click)="toggleFlip()">
                    Back to question
                </button>
            </div>
        </div>
    </div>
</div>
