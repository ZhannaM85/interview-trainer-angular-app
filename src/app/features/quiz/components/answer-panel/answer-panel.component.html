<div class="answer-panel">
    <p class="answer-panel__label">Answer</p>
    <p class="answer-panel__text">{{ question().answer }}</p>

    @if (question().explanation) {
        <p class="answer-panel__label">Explanation</p>
        <p class="answer-panel__text answer-panel__explanation">{{ question().explanation }}</p>
    }

    @if (question().example) {
        <p class="answer-panel__label">Example</p>
        <pre class="answer-panel__example">{{ question().example }}</pre>
    }
</div>
