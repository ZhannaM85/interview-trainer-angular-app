<div class="interview-q">
    <p class="interview-q__badge">
        <span>{{ ('category.' + question().category) | translate }}</span>
        <span class="interview-q__dot" aria-hidden="true">•</span>
        <span>{{ ('difficulty.' + question().difficulty) | translate }}</span>
    </p>

    @let parts = question().question | splitQuestionCode;
    @if (parts.code) {
        <h1 class="interview-q__title">{{ parts.lead }}</h1>
        <pre class="interview-q__code" tabindex="0"><code>{{ parts.code }}</code></pre>
    } @else {
        <h1 class="interview-q__title">{{ question().question }}</h1>
    }

    <app-quiz-timer
        [resetKey]="question().id"
        [durationSeconds]="durationSeconds()"
        (expired)="timerExpired.emit()"
    />

    <button type="button" class="interview-q__cta" (click)="answered.emit()">
        {{ 'interviewQuestion.cta' | translate }}
    </button>
</div>
